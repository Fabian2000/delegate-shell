name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: dgsh-linux-x86_64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            name: dgsh-linux-arm64
          - target: x86_64-apple-darwin
            os: macos-latest
            name: dgsh-macos-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            name: dgsh-macos-arm64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            name: dgsh-windows-x86_64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Build library (for AOT compilation)
        run: cargo build --release --lib --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../${{ matrix.name }}.tar.gz dgsh
          cd ../../..
          LIB_NAME=$(echo "${{ matrix.name }}" | sed 's/dgsh/libdelegate_shell/')
          cd target/${{ matrix.target }}/release
          tar czf ../../../${LIB_NAME}.tar.gz libdelegate_shell.a
          cd ../../..

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          7z a ../../../${{ matrix.name }}.zip dgsh.exe
          cd ../../..
          $LIB_NAME = "${{ matrix.name }}" -replace "dgsh","libdelegate_shell"
          cd target/${{ matrix.target }}/release
          7z a ../../../${LIB_NAME}.zip delegate_shell.lib
          cd ../../..

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}.*

      - name: Upload library artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}-lib
          path: libdelegate_shell*.*

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
